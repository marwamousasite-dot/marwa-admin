<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marwa Mousa Admin</title>

<style>
body{
  font-family: serif;
  background:#f4efe6;
  margin:0;
  padding:40px;
  text-align:center;
}

h1{
  color:#6b4f3b;
  margin-bottom:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:#fff;
  padding:40px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-decoration:none;
  color:#6b4f3b;
  font-size:20px;
  transition:0.3s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-5px);
  background:#f1e4d3;
}

.icon{
  font-size:40px;
  display:block;
  margin-bottom:10px;
}

form{
  margin-top:50px;
  display:flex;
  flex-direction:column;
  gap:15px;
  max-width:400px;
  margin-left:auto;
  margin-right:auto;
}

input, textarea, button{
  padding:10px;
  font-size:16px;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  background:#6b4f3b;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#5a3f2d;
}
</style>
</head>
<body>

<h1>Marwa Mousa Admin</h1>

<div class="grid" id="dashboard">
  <div class="card" data-category="rings"><span class="icon">💍</span>Rings</div>
  <div class="card" data-category="earrings"><span class="icon">✨</span>Earrings</div>
  <div class="card" data-category="necklaces"><span class="icon">📿</span>Necklaces</div>
  <div class="card" data-category="bracelets"><span class="icon">🪬</span>Bracelets</div>
  <div class="card" data-category="bags"><span class="icon">👜</span>Bags</div>
  <div class="card" data-category="leathers"><span class="icon">🧵</span>Leathers</div>
  <div class="card" data-category="bestsellers"><span class="icon">🔥</span>Best Sellers</div>
  <div class="card" data-category="beads"><span class="icon">🟤</span>Beads</div>
</div>

<form id="productForm" style="display:none;">
  <h2>Add Product (<span id="categoryName"></span>)</h2>
  <input type="text" id="name" placeholder="Product Name" required>
  <input type="number" id="price" placeholder="Price" required>
  <textarea id="desc" placeholder="Description"></textarea>
  <input type="file" id="image" required>
  <button type="submit">Add Product</button>
</form>

<script>
const dashboard = document.getElementById("dashboard");
const form = document.getElementById("productForm");
const categoryName = document.getElementById("categoryName");
let currentCategory = "";

// اختيار القسم
dashboard.addEventListener("click", (e)=>{
  const card = e.target.closest(".card");
  if(!card) return;
  currentCategory = card.dataset.category;
  categoryName.textContent = currentCategory;
  form.style.display = "flex";
  dashboard.style.display = "none";
});

// تحويل الصورة لـ Base64
function getBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// إرسال الفورم
form.addEventListener("submit", async function(e){
  e.preventDefault();
  const file = document.getElementById("image").files[0];
  if(!file){
    alert("Please select an image");
    return;
  }

  const submitButton = form.querySelector("button");
  submitButton.disabled = true;
  submitButton.textContent = "Uploading..."; // تغيير النص أثناء التحميل

  try {
    const base64Image = await getBase64(file);

    const data = {
      name: document.getElementById("name").value,
      price: document.getElementById("price").value,
      desc: document.getElementById("desc").value,
      image: base64Image,
      category: currentCategory
    };

    const response = await fetch("https://script.google.com/macros/s/AKfycbzdsOl1-IY7ulwoGAI77yWSXs8dDJe_9IU9WSLjHaW3q6fxoY095dtsCwDf1ykotfn3/exec", {
      method:"POST",
      body: JSON.stringify(data)
    });

    await response.text(); // انتظار النص من السيرفر

    alert("Product Uploaded Successfully!");  // رسالة نجاح
    form.reset();
    form.style.display = "none";
    dashboard.style.display = "grid";

  } catch(err) {
    alert("Error: " + err);  // رسالة خطأ
  } finally {
    submitButton.disabled = false;
    submitButton.textContent = "Add Product"; // إعادة النص الأصلي للزر
  }
});
</script>

</body>
</html>
